name: flutter_godesk
description: GoDesk skeuomorphic UI — sibling package replacing upstream client/flutter.
publish_to: 'none'
version: 0.8.1+81

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0
  # google_fonts removed in Phase 2.3 — fonts now bundled (assets/fonts/).
  # Phase 2.4 — FFI dependencies, mirrored from upstream client/flutter/pubspec.yaml
  # so the same flutter_rust_bridge_codegen run targeting client/src/flutter_ffi.rs
  # produces a `lib/bridge/generated_bridge.dart` that compiles against this
  # package as well. Pinned to upstream's exact versions.
  ffi: ^2.1.0
  flutter_rust_bridge: 1.80.1
  # Generated bridge passes session IDs as UuidValue (from `uuid` package).
  # flutter_rust_bridge 1.80.1 pins uuid ^3.0.6 — must match.
  uuid: ^3.0.6
  # Generated bridge uses freezed annotations for sealed EventToUI variants.
  freezed_annotation: ^2.4.4
  # Phase 2.3 final — production polish on Windows
  tray_manager: ^0.2.4         # system tray icon + menu (minimise-to-tray)
  window_manager: ^0.4.3       # show/hide/restore window from tray
  path_provider: ^2.1.4        # %LOCALAPPDATA%\GoDesk\logs path
  # Phase 2.4 — remote screen rendering. RustDesk's pinned fork; same
  # commit upstream client/flutter uses so the protocol matches.
  texture_rgba_renderer:
    git:
      url: https://github.com/rustdesk-org/flutter_texture_rgba_renderer
      ref: 42797e0f03141dc2b585f76c64a13974508058b4
  # File picker for ADD FILES / ADD FOLDER actions in the Files screen.
  file_picker: ^8.1.4
  # Drag-and-drop file paths into the Files screen → enqueue transfers.
  desktop_drop: ^0.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  ffigen: ^8.0.2
  # flutter_rust_bridge_codegen invokes `flutter pub run build_runner build`
  # after generating the Dart FFI surface, to produce the platform-specific
  # bridge_generated.io.dart / .web.dart split files. Required even though
  # we only target Windows — codegen aborts without it.
  build_runner: ^2.4.13
  # ffi_generator emits the IO impl from generated_bridge.dart annotations.
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  # Bundles MaterialIcons-Regular.otf so `Icons.X` glyphs (content_copy,
  # refresh, visibility, arrow_forward, etc.) actually render. With this set
  # to false (the previous value), every Material Icon used across the UI —
  # the COPY ID clipboard, OTP eye/refresh, CONNECT arrow, ADD FILES plus,
  # session toolbar mic/record, etc. — fell back to tofu squares.
  # Cost: ~600 KB to bundle size, accepted for visible-icon fix.
  uses-material-design: true
  assets:
    - assets/icons/
  # Bundled per Phase 2.3 — offline-first, no runtime CDN fetch.
  # Note: InterTight-*.ttf currently shipping as Inter (rsms/inter v4.1) —
  # visually near-identical, replace with true Inter Tight TTFs when SIL OFL
  # license source is located.
  fonts:
    - family: InterTight
      fonts:
        - asset: assets/fonts/InterTight-Regular.ttf
          weight: 400
        - asset: assets/fonts/InterTight-Medium.ttf
          weight: 500
        - asset: assets/fonts/InterTight-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/InterTight-Bold.ttf
          weight: 700
        - asset: assets/fonts/InterTight-ExtraBold.ttf
          weight: 800
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
